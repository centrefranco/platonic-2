title: About Us
content:
  - type: textBlock
    text:
      Enfin, la transdisciplinarité, en tant que vecteur d’innovation éducative,
      invite à repenser les frontières entre les disciplines pour construire une
      vision holistique du savoir.
  - type: textBlock
    text:
      Les projets interdisciplinaires, intégrant des problématiques sociétales
      complexes, permettent de mobiliser des compétences transversales tout en
      ancrant les apprentissages dans des contextes authentiques.
