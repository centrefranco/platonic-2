          - { label: 'Name', name: 'name', widget: 'string', required: true }
          - { label: 'Slug', name: 'slug', widget: 'string', required: true, pattern: '^[a-z0-9-]+$' }
          - { label: 'Description', name: 'description', widget: 'formatted-text' }
          - label: 'Code'
            name: 'code'
            widget: 'select'
            options:
              - label: 'Science'
                value: 'sci'
              - label: 'Economics'
                value: 'eco'
              - label: 'Grammar'
                value: 'gra'
          - label: 'Color'
            name: 'color'
            widget: 'color'
            allow_input: true
          - label: 'Size'
            name: 'size'
            widget: 'select'
            options:
              - label: 'XS'
                value: 'xs'
              - label: 'S'
                value: 's'
              - label: 'M'
                value: 'm'
              - label: 'L'
