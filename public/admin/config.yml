      - label: 'Code'
        name: 'code'
        file: 'src/content/resourceFilters/code.yml'
        fields:
          - { label: 'ID', name: 'id', widget: 'string', required: true }
          - { label: 'Name', name: 'name', widget: 'string', required: true }
          - { label: 'Slug', name: 'slug', widget: 'string', required: true, pattern: '^[a-z0-9-]+$' }
          - label: 'Options'
            name: 'options'
            widget: 'list'
            fields:
              - { label: 'Value', name: 'value', widget: 'string' }
              - { label: 'Label', name: 'label', widget: 'string' }
              - { label: 'Is Selected', name: 'isSelected', widget: 'boolean' }

